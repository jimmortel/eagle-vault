<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eagle Vault</title>
    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        /* Effet d'aura derrière le coffre */
        .vault-container {
            position: relative;
            margin-bottom: 20px;
        }
        .vault-container::after {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 250px; height: 250px;
            background: radial-gradient(circle, rgba(255,215,0,0.2) 0%, rgba(0,0,0,0) 70%);
            z-index: -1;
        }

        img#vault-img {
    width: 150px; /* On réduit pour que le bouton remonte */
    height: auto;
    filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.5));
    animation: float 4s ease-in-out infinite;
    display: block;
    margin: 0 auto;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-size: 1.5rem;
            letter-spacing: 3px;
            color: #ffd700;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            margin: 10px 0;
        }

        /* La Jauge de progression */
        .progress-container {
            width: 80%;
            max-width: 300px;
            height: 12px;
            background: #222;
            border-radius: 6px;
            border: 1px solid #444;
            margin: 15px 0;
            position: relative;
        }
        .progress-bar {
            width: 45%; /* À dynamiser plus tard */
            height: 100%;
            background: linear-gradient(90deg, #b8860b, #ffd700);
            border-radius: 6px;
            box-shadow: 0 0 10px #ffd700;
            transition: width 0.5s ease;
        }

        .status {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 20px;
        }

        /* Le Bouton Doré */
        .btn-gold {
            background: linear-gradient(45deg, #b8860b, #ffd700);
            border: none;
            padding: 15px 30px;
            color: #000;
            font-weight: bold;
            font-size: 1rem;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
            transition: transform 0.2s;
        }
        .btn-gold:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="vault-container">
        <img src="eaglevault.jpg" id="vault-img" alt="Golden Vault">
    </div>

    <h1>EAGLE VAULT</h1>

    <div class="progress-container">
        <div class="progress-bar" id="bar"></div>
    </div>
    
    <div class="status">
        <span id="current">0.000</span> / <span id="goal">0.10</span> SOL
    </div>

    <button class="btn-gold" onclick="connectAndPay()">UNLOCK FOR 0.005 SOL</button>

    <p style="font-size: 0.7rem; color: #555; margin-top: 20px;">
        Last contributor: <span id="leader" style="color:#ffd700">En attente...</span>
    </p>

    <script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.min.js"></script>
<script>
    const GOAL = 0.10;
    const RECEIVER = "GU5dNvMQKoUiVJvZ5HUgrv3CxtrR5ujxfHK2HPT6Z6bV";

    async function loadVaultData() {
        try {
            const response = await fetch('/api/vault');
            const data = await response.json();
            document.getElementById('current').innerText = data.total.toFixed(3);
            document.getElementById('leader').innerText = data.leader;
            document.getElementById('bar').style.width = (data.total / GOAL * 100) + "%";
        } catch (e) { console.log("DB non connectée"); }
    }

    async function connectAndPay() {
        if (!window.solana) return alert("Installe Phantom sur ton mobile !");
        try {
            const resp = await window.solana.connect();
            const connection = new solanaWeb3.Connection(solanaWeb3.clusterApiUrl("mainnet-beta"));
            const transaction = new solanaWeb3.Transaction().add(
                solanaWeb3.SystemProgram.transfer({
                    fromPubkey: resp.publicKey,
                    toPubkey: new solanaWeb3.PublicKey(RECEIVER),
                    lamports: 0.005 * solanaWeb3.LAMPORTS_PER_SOL,
                })
            );
            const { signature } = await window.solana.signAndSendTransaction(transaction);
            
            await fetch('/api/vault', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ amount: 0.005, user: "@" + resp.publicKey.toString().substring(0,6) })
            });
            alert("Transaction réussie !");
            loadVaultData();
        } catch (err) { alert("Erreur ou annulation."); }
    }
    window.onload = loadVaultData;
                </script>
</body>
</html>
